<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>서블릿(Servlet)</title>
</head>
<body>
    <h2>서블릿(Servlet)</h2>
    <h3>1. 서블릿</h3>
    <p>
        서블릿은 웹 브라우저로부터 요청을 받아 처리하고 결과를 다시 웹 브라우저로 전송하는 역할을 한다.<br>
        서블릿은 자바 클래스로 생성하고 jakarta.servlet.http.HttpServlet 클래스를 상속해야 한다.
    </p>

        <!--
            <a href="https://www.naver.com">www.naver.com</a>

            <a href="/servlet/first">View details</a>
        -->

        <a href="/servlet/first">View first-details</a><br>
        <a href="/servlet/second">View second-details</a>

    <h3>2. 서블릿 생명 주기</h3>
    <p>
        객체가 생성 후 소멸되기까지의 과정을 라이프 사이클이라고 한다.
    </p>

    <a href = "/servlet/life"> View life-details </a>
</body>
</html>
